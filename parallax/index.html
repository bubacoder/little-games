<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parallax Window</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      overflow: hidden;
      font-family: system-ui, sans-serif;
    }

    #three-canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }

    #webcam {
      position: fixed;
      bottom: 10px;
      right: 10px;
      width: 160px;
      height: 120px;
      border-radius: 8px;
      opacity: 0.4;
      border: 1px solid rgba(255,255,255,0.2);
      display: none;
      transform: scaleX(-1);
    }

    #status {
      position: fixed;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.55);
      color: #fff;
      font-size: 12px;
      padding: 5px 12px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      gap: 7px;
      pointer-events: none;
      transition: opacity 0.4s;
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.12);
    }

    #status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #888;
      transition: background 0.3s;
    }

    #status-dot.active   { background: #4ade80; }
    #status-dot.warning  { background: #facc15; }
    #status-dot.error    { background: #f87171; }

    #settings {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 14px 20px;
      color: #fff;
      font-size: 12px;
      display: none;
      gap: 14px;
      flex-direction: column;
      min-width: 280px;
    }

    #settings.visible { display: flex; }

    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .setting-row label { min-width: 90px; opacity: 0.8; }

    .setting-row input[type=range] {
      flex: 1;
      accent-color: #818cf8;
    }

    .setting-row span { min-width: 30px; text-align: right; opacity: 0.7; }

    .setting-divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.1);
      margin: 2px 0;
    }

    /* Scene selector buttons */
    #scene-btns {
      display: flex;
      gap: 8px;
      flex: 1;
    }

    .scene-btn {
      flex: 1;
      padding: 6px 4px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.2);
      background: transparent;
      color: rgba(255,255,255,0.6);
      font-size: 11px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
      white-space: nowrap;
    }

    .scene-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .scene-btn.active { background: #818cf8; border-color: #818cf8; color: #fff; }

    #hint {
      position: fixed;
      bottom: 16px;
      right: 20px;
      font-size: 11px;
      color: rgba(255,255,255,0.3);
      pointer-events: none;
    }

    #permission-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      gap: 16px;
      z-index: 100;
      backdrop-filter: blur(4px);
    }

    #permission-overlay h2 { font-size: 22px; font-weight: 600; }
    #permission-overlay p  { font-size: 14px; opacity: 0.7; max-width: 360px; text-align: center; line-height: 1.6; }

    #permission-overlay .privacy-note {
      font-size: 12px;
      opacity: 0.45;
      max-width: 340px;
      text-align: center;
    }

    #start-btn {
      background: #818cf8;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 28px;
      font-size: 14px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s;
    }

    #start-btn:hover { background: #6366f1; }

    #skip-btn {
      background: transparent;
      color: rgba(255,255,255,0.4);
      border: none;
      font-size: 12px;
      cursor: pointer;
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div id="permission-overlay">
    <h2>Parallax Window</h2>
    <p>Uses your webcam to track head position and shift the 3D scene perspective — like looking through a window.</p>
    <p class="privacy-note">All processing happens locally in your browser. No video is ever sent anywhere.</p>
    <button id="start-btn">Enable Camera</button>
    <button id="skip-btn">Skip (mouse mode)</button>
  </div>

  <canvas id="three-canvas"></canvas>
  <video id="webcam" autoplay playsinline muted></video>

  <div id="status">
    <div id="status-dot"></div>
    <span id="status-text">Initialising…</span>
  </div>

  <div id="settings">
    <!-- Scene selector -->
    <div class="setting-row">
      <label>Scene</label>
      <div id="scene-btns">
        <button class="scene-btn active" data-scene="1">Space</button>
        <button class="scene-btn"        data-scene="2">Forest</button>
        <button class="scene-btn"        data-scene="3">Cockpit</button>
        <button class="scene-btn"        data-scene="4">Synthwave</button>
      </div>
    </div>
    <hr class="setting-divider" />
    <div class="setting-row">
      <label>Sensitivity</label>
      <input type="range" id="sens-slider" min="1" max="20" value="8" step="0.5" />
      <span id="sens-val">8</span>
    </div>
    <div class="setting-row">
      <label>Smoothing</label>
      <input type="range" id="smooth-slider" min="1" max="30" value="12" step="1" />
      <span id="smooth-val">0.12</span>
    </div>
    <div class="setting-row">
      <label>Mirror X</label>
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;flex:1">
        <input type="checkbox" id="mirror-toggle" checked style="width:16px;height:16px;accent-color:#818cf8;cursor:pointer" />
        <span id="mirror-val" style="opacity:0.7">On</span>
      </label>
    </div>
    <div class="setting-row">
      <label>Mirror Y</label>
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;flex:1">
        <input type="checkbox" id="mirrory-toggle" checked style="width:16px;height:16px;accent-color:#818cf8;cursor:pointer" />
        <span id="mirrory-val" style="opacity:0.7">On</span>
      </label>
    </div>
    <div class="setting-row">
      <label>Window Frame</label>
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;flex:1">
        <input type="checkbox" id="frame-toggle" checked style="width:16px;height:16px;accent-color:#818cf8;cursor:pointer" />
        <span id="frame-val" style="opacity:0.7">On</span>
      </label>
    </div>
  </div>

  <div id="hint">S — settings &nbsp;|&nbsp; F — fullscreen &nbsp;|&nbsp; D — debug cam &nbsp;|&nbsp; Space — pause</div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';

    // ─── State ───────────────────────────────────────────────────────────────
    const state = {
      headX: 0, headY: 0,
      rawX:  0, rawY:  0,
      sensitivity: 8,
      smoothing: 0.12,
      paused: false,
      mirrorX: true,
      mirrorY: true,
      cameraMode: 'webcam',
      faceDetected: false,
      currentScene: 1,
    };

    // ─── Renderer ────────────────────────────────────────────────────────────
    const canvas   = document.getElementById('three-canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;

    const scene  = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
    camera.position.set(0, 0, 8);

    // Persistent group for window frame bars — survives scene switches
    const frameGroup = new THREE.Group();
    scene.add(frameGroup);

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ─── Scene management ────────────────────────────────────────────────────
    // Each scene builder returns { objects, animateFn, cleanup }
    // objects = meshes to auto-rotate (optional)
    // animateFn(t) = called each frame
    // cleanup() = dispose all scene objects

    let activeScene = null;

    function clearScene() {
      if (activeScene && activeScene.cleanup) activeScene.cleanup();
      // Remove all objects except camera and frameGroup
      const toRemove = scene.children.filter(o => o !== frameGroup);
      toRemove.forEach(obj => {
        scene.remove(obj);
        if (obj.geometry) obj.geometry.dispose();
        if (obj.material) {
          if (Array.isArray(obj.material)) obj.material.forEach(m => m.dispose());
          else obj.material.dispose();
        }
      });
      // Clear frame bars from previous scene
      while (frameGroup.children.length > 0) {
        const obj = frameGroup.children[0];
        frameGroup.remove(obj);
        if (obj.geometry) obj.geometry.dispose();
        if (obj.material) obj.material.dispose();
      }
      scene.fog = null;
      scene.background = null;
    }

    function loadScene(id) {
      clearScene();
      state.currentScene = id;
      if      (id === 1) activeScene = buildScene1();
      else if (id === 2) activeScene = buildScene2();
      else if (id === 3) activeScene = buildScene3();
      else if (id === 4) activeScene = buildScene4();

      // Update button states
      document.querySelectorAll('.scene-btn').forEach(btn => {
        btn.classList.toggle('active', parseInt(btn.dataset.scene) === id);
      });
    }

    // ─── SCENE 1: Space / Geometric ──────────────────────────────────────────
    function buildScene1() {
      scene.background = new THREE.Color(0x0a0a14);
      scene.fog = new THREE.Fog(0x0a0a14, 18, 35);

      const objects = [];

      // Stars
      const starGeo = new THREE.BufferGeometry();
      const starCount = 1800;
      const starPos = new Float32Array(starCount * 3);
      for (let i = 0; i < starCount * 3; i++) starPos[i] = (Math.random() - 0.5) * 60;
      starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
      const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.08, sizeAttenuation: true }));
      stars.position.z = -20;
      scene.add(stars);

      // Window frame
      const frameMat = new THREE.MeshStandardMaterial({ color: 0x1e1e2e, roughness: 0.8, metalness: 0.3 });
      function bar(w, h, d, x, y, z) {
        const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), frameMat);
        m.position.set(x, y, z);
        frameGroup.add(m);
      }
      const fz = 5.5, fw = 9, fh = 6.5;
      bar(fw + 0.4, 0.35, 0.35,  0,       fh / 2,  fz);
      bar(fw + 0.4, 0.35, 0.35,  0,      -fh / 2,  fz);
      bar(0.35, fh + 0.35, 0.35, -fw / 2, 0,       fz);
      bar(0.35, fh + 0.35, 0.35,  fw / 2, 0,       fz);
      bar(fw + 0.4, 0.2,  0.2,   0,       0,       fz);
      bar(0.2, fh + 0.35, 0.2,   0,       0,       fz);

      // Floating objects
      function addObj(geo, color, x, y, z) {
        const m = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ color, roughness: 0.4, metalness: 0.6 }));
        m.position.set(x, y, z);
        m.castShadow = true;
        scene.add(m);
        objects.push(m);
        return m;
      }
      addObj(new THREE.IcosahedronGeometry(0.7, 0),      0x818cf8,  0,     0,    -2);
      addObj(new THREE.BoxGeometry(0.9, 0.9, 0.9),       0x34d399, -3,     1.2,  -4);
      addObj(new THREE.OctahedronGeometry(0.6),           0xf472b6,  3,    -1,   -3);
      addObj(new THREE.TorusGeometry(0.5, 0.18, 16, 40), 0xfbbf24, -2,    -1.5,  -1);
      addObj(new THREE.ConeGeometry(0.5, 1.1, 6),        0x38bdf8,  2.5,   1.5,  -2.5);

      const grid = new THREE.GridHelper(30, 30, 0x1e293b, 0x1e293b);
      grid.position.set(0, -4, -10);
      scene.add(grid);

      // Lights
      scene.add(new THREE.AmbientLight(0xffffff, 0.4));
      const pl1 = new THREE.PointLight(0x818cf8, 40, 20);
      pl1.position.set(0, 4, 2);
      pl1.castShadow = true;
      scene.add(pl1);
      const pl2 = new THREE.PointLight(0x34d399, 25, 20);
      pl2.position.set(-5, -2, -5);
      scene.add(pl2);
      const dl = new THREE.DirectionalLight(0xffffff, 0.8);
      dl.position.set(5, 10, 5);
      scene.add(dl);

      return {
        animateFn(t) {
          objects.forEach((obj, i) => {
            obj.rotation.x += 0.003 + i * 0.0005;
            obj.rotation.y += 0.005 + i * 0.0003;
          });
        },
        cleanup() {}
      };
    }

    // ─── SCENE 2: Forest with Animals ────────────────────────────────────────
    function buildScene2() {
      scene.background = new THREE.Color(0x0d1f0a);
      scene.fog = new THREE.FogExp2(0x0d1f0a, 0.045);

      const objects = [];

      // Ground
      const ground = new THREE.Mesh(
        new THREE.PlaneGeometry(80, 80),
        new THREE.MeshStandardMaterial({ color: 0x1a3a10, roughness: 0.9 })
      );
      ground.rotation.x = -Math.PI / 2;
      ground.position.y = -3.2;
      ground.receiveShadow = true;
      scene.add(ground);

      // Sky gradient via background color + fog is enough; add moon
      const moon = new THREE.Mesh(
        new THREE.SphereGeometry(1.2, 16, 16),
        new THREE.MeshStandardMaterial({ color: 0xfffde7, emissive: 0xfffde7, emissiveIntensity: 0.6 })
      );
      moon.position.set(-6, 7, -25);
      scene.add(moon);

      // Stars (sparse for night forest)
      const sGeo = new THREE.BufferGeometry();
      const sPos = new Float32Array(600 * 3);
      for (let i = 0; i < 600 * 3; i++) sPos[i] = (Math.random() - 0.5) * 80;
      sGeo.setAttribute('position', new THREE.BufferAttribute(sPos, 3));
      const starPts = new THREE.Points(sGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.12 }));
      starPts.position.y = 15;
      starPts.position.z = -30;
      scene.add(starPts);

      // Helper: make a tree at x,z with scale s
      function makeTree(x, z, s = 1) {
        const group = new THREE.Group();

        // Trunk
        const trunk = new THREE.Mesh(
          new THREE.CylinderGeometry(0.15 * s, 0.22 * s, 1.8 * s, 7),
          new THREE.MeshStandardMaterial({ color: 0x4a2f1a, roughness: 1 })
        );
        trunk.position.y = -2.3 + 0.9 * s;
        trunk.castShadow = true;
        group.add(trunk);

        // Three stacked cones (canopy layers)
        const leafColor = new THREE.MeshStandardMaterial({ color: 0x1a5c1a, roughness: 0.8 });
        [[1.4 * s, 2.2 * s, 0], [1.1 * s, 1.8 * s, 0.9 * s], [0.7 * s, 1.4 * s, 1.8 * s]].forEach(([r, h, yo]) => {
          const cone = new THREE.Mesh(new THREE.ConeGeometry(r, h, 8), leafColor);
          cone.position.y = -2.3 + 1.8 * s + yo;
          cone.castShadow = true;
          group.add(cone);
        });

        group.position.set(x, 0, z);
        scene.add(group);
        return group;
      }

      // Forest rows at different depths
      const treePositions = [
        // far row
        [-12,-18],[-8,-20],[-4,-19],[0,-21],[4,-20],[8,-19],[12,-18],[16,-20],[-16,-19],
        // mid row
        [-10,-12],[-6,-11],[-2,-13],[2,-12],[6,-11],[10,-13],[14,-12],[-14,-11],
        // near row
        [-8,-7],[-4,-6],[4,-7],[8,-6],[12,-7],[-12,-6],
        // very near sides
        [-9,-3],[9,-3],[-11,-1],[11,-1],
      ];
      const treeMeshes = treePositions.map(([x, z]) => makeTree(x, z, 0.7 + Math.random() * 0.6));

      // ── Animals ──────────────────────────────────────────────────────────
      // Deer (simple: body + head + legs + antlers)
      function makeDeer(x, z) {
        const g = new THREE.Group();
        const mat = new THREE.MeshStandardMaterial({ color: 0x8b5e3c, roughness: 0.8 });

        // Body
        const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.3, 0.7, 4, 8), mat);
        body.rotation.z = Math.PI / 2;
        body.position.set(0, -1.8, 0);
        g.add(body);

        // Neck
        const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.16, 0.5, 6), mat);
        neck.rotation.z = -0.4;
        neck.position.set(0.4, -1.4, 0);
        g.add(neck);

        // Head
        const head = new THREE.Mesh(new THREE.SphereGeometry(0.2, 8, 8), mat);
        head.position.set(0.65, -1.1, 0);
        g.add(head);

        // Snout
        const snout = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.1, 0.25, 6), mat);
        snout.rotation.z = Math.PI / 2;
        snout.position.set(0.88, -1.15, 0);
        g.add(snout);

        // Legs (4)
        const legMat = new THREE.MeshStandardMaterial({ color: 0x6b4423, roughness: 0.9 });
        [[-0.25, 0.15], [-0.25, -0.15], [0.25, 0.15], [0.25, -0.15]].forEach(([lx, lz]) => {
          const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.05, 0.9, 5), legMat);
          leg.position.set(lx, -2.6, lz);
          g.add(leg);
        });

        // Antlers (two branching lines via boxes)
        const antMat = new THREE.MeshStandardMaterial({ color: 0x5a3a1a });
        [[0.08], [-0.08]].forEach(([az]) => {
          const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.03, 0.45, 4), antMat);
          stem.position.set(0.65, -0.72, az);
          g.add(stem);
          const branch = new THREE.Mesh(new THREE.CylinderGeometry(0.018, 0.022, 0.3, 4), antMat);
          branch.rotation.z = 0.5;
          branch.position.set(0.78, -0.52, az);
          g.add(branch);
        });

        g.position.set(x, 0, z);
        g.castShadow = true;
        scene.add(g);
        objects.push(g);
        return g;
      }

      // Owl (sitting on branch stub)
      function makeOwl(x, y, z) {
        const g = new THREE.Group();
        const mat = new THREE.MeshStandardMaterial({ color: 0x6b4f2a, roughness: 0.9 });

        // Body
        const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.18, 0.3, 4, 8), mat);
        body.position.y = 0;
        g.add(body);

        // Head
        const head = new THREE.Mesh(new THREE.SphereGeometry(0.16, 8, 8), mat);
        head.position.y = 0.42;
        g.add(head);

        // Eyes
        const eyeMat = new THREE.MeshStandardMaterial({ color: 0xffdd44, emissive: 0xffdd44, emissiveIntensity: 0.4 });
        [-0.07, 0.07].forEach(ex => {
          const eye = new THREE.Mesh(new THREE.SphereGeometry(0.05, 6, 6), eyeMat);
          eye.position.set(ex, 0.44, 0.13);
          g.add(eye);
        });

        // Ears (tufts)
        const earMat = new THREE.MeshStandardMaterial({ color: 0x5a3e1a });
        [-0.07, 0.07].forEach(ex => {
          const ear = new THREE.Mesh(new THREE.ConeGeometry(0.04, 0.1, 4), earMat);
          ear.position.set(ex, 0.6, 0);
          g.add(ear);
        });

        // Wings (flat boxes)
        const wingMat = new THREE.MeshStandardMaterial({ color: 0x7a5a2a, roughness: 1 });
        [-1, 1].forEach(side => {
          const wing = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.4, 0.22), wingMat);
          wing.position.set(side * 0.24, 0, 0);
          g.add(wing);
        });

        // Branch stub
        const branch = new THREE.Mesh(
          new THREE.CylinderGeometry(0.06, 0.07, 1.2, 6),
          new THREE.MeshStandardMaterial({ color: 0x3a2210, roughness: 1 })
        );
        branch.rotation.z = Math.PI / 2;
        branch.position.y = -0.35;
        g.add(branch);

        g.position.set(x, y, z);
        scene.add(g);
        objects.push(g);
        return g;
      }

      // Rabbit
      function makeRabbit(x, z) {
        const g = new THREE.Group();
        const mat = new THREE.MeshStandardMaterial({ color: 0xd4c5a9, roughness: 0.9 });

        const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.14, 0.22, 4, 8), mat);
        body.position.y = -2.9;
        g.add(body);

        const head = new THREE.Mesh(new THREE.SphereGeometry(0.12, 8, 8), mat);
        head.position.set(0.18, -2.68, 0);
        g.add(head);

        // Ears
        [0.06, -0.06].forEach(ez => {
          const ear = new THREE.Mesh(new THREE.CapsuleGeometry(0.03, 0.22, 4, 6), mat);
          ear.position.set(0.14, -2.46, ez);
          g.add(ear);
        });

        g.position.set(x, 0, z);
        scene.add(g);
        objects.push(g);
        return g;
      }

      // Place animals
      const deer1 = makeDeer(-2, -8);
      const deer2 = makeDeer(3.5, -10);
      deer2.rotation.y = Math.PI * 0.7;
      const owl   = makeOwl(5, 0.3, -7);
      const rabbit1 = makeRabbit(-4, -5);
      const rabbit2 = makeRabbit(1.5, -5.5);
      rabbit2.rotation.y = 1.2;

      // Fireflies (glowing points)
      const ffGeo = new THREE.BufferGeometry();
      const ffCount = 40;
      const ffPos = new Float32Array(ffCount * 3);
      for (let i = 0; i < ffCount; i++) {
        ffPos[i * 3]     = (Math.random() - 0.5) * 14;
        ffPos[i * 3 + 1] = -2 + Math.random() * 3;
        ffPos[i * 3 + 2] = -5 - Math.random() * 10;
      }
      ffGeo.setAttribute('position', new THREE.BufferAttribute(ffPos, 3));
      const ffMesh = new THREE.Points(ffGeo, new THREE.PointsMaterial({
        color: 0xaaff66, size: 0.12, sizeAttenuation: true,
        transparent: true, opacity: 0.85
      }));
      scene.add(ffMesh);

      // Window frame (wooden)
      const wFrameMat = new THREE.MeshStandardMaterial({ color: 0x3d2010, roughness: 0.95, metalness: 0.05 });
      function wbar(w, h, d, x, y, z) {
        const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), wFrameMat);
        m.position.set(x, y, z);
        frameGroup.add(m);
      }
      const fz = 5.5, fw = 9, fh = 6.5;
      wbar(fw + 0.4, 0.45, 0.45,  0,       fh / 2,  fz);
      wbar(fw + 0.4, 0.45, 0.45,  0,      -fh / 2,  fz);
      wbar(0.45, fh + 0.45, 0.45, -fw / 2, 0,       fz);
      wbar(0.45, fh + 0.45, 0.45,  fw / 2, 0,       fz);
      wbar(fw + 0.4, 0.22, 0.22,   0,       0,       fz);
      wbar(0.22, fh + 0.45, 0.22,  0,       0,       fz);

      // Lighting — moonlit
      scene.add(new THREE.AmbientLight(0x112233, 0.9));
      const moonLight = new THREE.DirectionalLight(0x99bbff, 1.2);
      moonLight.position.set(-4, 10, 5);
      moonLight.castShadow = true;
      scene.add(moonLight);
      const warmFill = new THREE.PointLight(0xff9944, 8, 15);
      warmFill.position.set(0, 0, 2);
      scene.add(warmFill);

      let t = 0;
      return {
        animateFn(time) {
          t = time;
          // Firefly bobbing
          const pos = ffGeo.attributes.position.array;
          for (let i = 0; i < ffCount; i++) {
            pos[i * 3 + 1] += Math.sin(time * 2.1 + i * 1.3) * 0.003;
          }
          ffGeo.attributes.position.needsUpdate = true;
          ffMesh.material.opacity = 0.5 + 0.5 * Math.sin(time * 1.5);

          // Gentle deer head bobbing
          deer1.children[2].position.y = -1.1 + Math.sin(time * 0.8) * 0.04;
          deer2.children[2].position.y = -1.1 + Math.sin(time * 0.9 + 1) * 0.04;

          // Owl head swivel
          owl.children[1].rotation.y = Math.sin(time * 0.4) * 0.5;

          // Rabbit twitch
          rabbit1.rotation.y = Math.sin(time * 1.2) * 0.15;
        },
        cleanup() {}
      };
    }

      rightLight.position.set(4, -1, 4);
      scene.add(rightLight);

      // Warm fill from behind camera
      const fillLight = new THREE.PointLight(0xffeedd, 25, 12);
      fillLight.position.set(0, 1, 7);
      scene.add(fillLight);

      // Sun through windshield
      const sunLight = new THREE.DirectionalLight(0xfff5ee, 1.2);
      sunLight.position.set(5, 8, -15);
      scene.add(sunLight);

      // Warning light (pulsing red)
      const warnLight = new THREE.PointLight(0xff3300, 8, 7);
      warnLight.position.set(-3.5, -1.5, 3.8);
      scene.add(warnLight);

      // ── Asteroids ─────────────────────────────────────────────────────────
      const asteroids = [];
      for (let i = 0; i < 14; i++) {
        const ast = new THREE.Mesh(
          new THREE.IcosahedronGeometry(0.12 + Math.random() * 0.28, 0),
          new THREE.MeshStandardMaterial({ color: 0x776655, roughness: 0.9, metalness: 0.2 })
        );
        ast.position.set(
          (Math.random() - 0.5) * 16,
          (Math.random() - 0.5) * 8,
          -8 - Math.random() * 22
        );
        ast.userData.speed = 0.012 + Math.random() * 0.035;
        scene.add(ast);
        asteroids.push(ast);
      }

      let t = 0;
      return {
        animateFn(time) {
          t = time;

          // Warn light pulse
          warnLight.intensity = 6 + Math.sin(time * 2.8) * 4;

          // Overhead flicker (very subtle)
          overhead1.intensity = 58 + Math.sin(time * 7.3) * 2;

          // Planet rotate
          planet.rotation.y += 0.0008;
          ring.rotation.z   += 0.0004;

          // Asteroids drift in
          asteroids.forEach(ast => {
            ast.position.z += ast.userData.speed;
            ast.rotation.x += 0.008;
            ast.rotation.y += 0.006;
            if (ast.position.z > 5) {
              ast.position.z = -28;
              ast.position.x = (Math.random() - 0.5) * 16;
              ast.position.y = (Math.random() - 0.5) * 8;
            }
          });

          // HUD pulse
          hudScreen.material.emissiveIntensity = 1.2 + Math.sin(time * 1.8) * 0.4;

          // Joystick knob pulse
          stickKnob.material.emissiveIntensity = 2 + Math.sin(time * 2.5) * 0.8;

          // Needle sweep (slow, natural)
          needles.forEach((n, i) => {
            n.rotation.z += Math.sin(time * (0.3 + i * 0.07)) * 0.004;
          });
        },
        cleanup() {}
      };
    }

    // ─── SCENE 4: Synthwave City ─────────────────────────────────────────────
    function buildScene4() {
      scene.background = new THREE.Color(0x0a0015);
      scene.fog = new THREE.FogExp2(0x0a0015, 0.032);

      // ── Sky gradient via layered planes ───────────────────────────────────
      // Horizon glow (wide flat box, magenta-to-purple)
      const horizonMat = new THREE.MeshBasicMaterial({ color: 0xff0080, transparent: true, opacity: 0.18 });
      const horizon = new THREE.Mesh(new THREE.PlaneGeometry(80, 6), horizonMat);
      horizon.position.set(0, -0.5, -38);
      scene.add(horizon);

      const horizonMat2 = new THREE.MeshBasicMaterial({ color: 0x6600cc, transparent: true, opacity: 0.22 });
      const horizon2 = new THREE.Mesh(new THREE.PlaneGeometry(80, 10), horizonMat2);
      horizon2.position.set(0, 2, -40);
      scene.add(horizon2);

      // ── Retro sun ─────────────────────────────────────────────────────────
      // Main disc
      const sunMat = new THREE.MeshBasicMaterial({ color: 0xff4488 });
      const sun = new THREE.Mesh(new THREE.CircleGeometry(3.5, 64), sunMat);
      sun.position.set(0, 1.2, -36);
      scene.add(sun);

      // Horizontal scan lines cutting across the sun (retro effect)
      const lineMat = new THREE.MeshBasicMaterial({ color: 0x0a0015 });
      const lineCount = 10;
      for (let i = 0; i < lineCount; i++) {
        const frac = i / lineCount;
        // Lines get thinner near top (perspective feel)
        const h = 0.08 + frac * 0.18;
        const line = new THREE.Mesh(new THREE.PlaneGeometry(7.2, h), lineMat);
        // Distribute in lower half of sun
        line.position.set(0, 1.2 - 1.0 + frac * 2.2 - 1.1, -35.9);
        scene.add(line);
      }

      // Sun glow halo (additive soft disc)
      const haloMat = new THREE.MeshBasicMaterial({ color: 0xff0066, transparent: true, opacity: 0.12 });
      const halo = new THREE.Mesh(new THREE.CircleGeometry(7, 32), haloMat);
      halo.position.set(0, 1.2, -37);
      scene.add(halo);

      // ── Stars ─────────────────────────────────────────────────────────────
      const sGeo = new THREE.BufferGeometry();
      const sCount = 1200;
      const sPos = new Float32Array(sCount * 3);
      for (let i = 0; i < sCount; i++) {
        sPos[i * 3]     = (Math.random() - 0.5) * 100;
        sPos[i * 3 + 1] = 4 + Math.random() * 30;
        sPos[i * 3 + 2] = -10 - Math.random() * 60;
      }
      sGeo.setAttribute('position', new THREE.BufferAttribute(sPos, 3));
      scene.add(new THREE.Points(sGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.1, sizeAttenuation: true })));

      // ── Neon grid floor ───────────────────────────────────────────────────
      // Three grids at different depths for parallax layering
      const gridMat = new THREE.MeshBasicMaterial({ color: 0xff00ff, wireframe: true, transparent: true, opacity: 0.55 });

      // Far grid (subdivided for perspective illusion)
      const farGrid = new THREE.Mesh(new THREE.PlaneGeometry(60, 60, 24, 24), gridMat);
      farGrid.rotation.x = -Math.PI / 2;
      farGrid.position.set(0, -3.5, -18);
      scene.add(farGrid);

      // Mid grid (denser, closer)
      const midGridMat = new THREE.MeshBasicMaterial({ color: 0xcc00ff, wireframe: true, transparent: true, opacity: 0.45 });
      const midGrid = new THREE.Mesh(new THREE.PlaneGeometry(20, 10, 12, 8), midGridMat);
      midGrid.rotation.x = -Math.PI / 2;
      midGrid.position.set(0, -3.5, -4);
      scene.add(midGrid);

      // Near floor solid (dark, receives grid reflection feel)
      const floorMat = new THREE.MeshStandardMaterial({ color: 0x080010, roughness: 0.8, metalness: 0.4 });
      const floor = new THREE.Mesh(new THREE.PlaneGeometry(30, 14), floorMat);
      floor.rotation.x = -Math.PI / 2;
      floor.position.set(0, -3.51, 0);
      scene.add(floor);

      // Horizon line (bright neon stripe at grid vanishing point)
      const horizLineMat = new THREE.MeshBasicMaterial({ color: 0xff00ff });
      const horizLine = new THREE.Mesh(new THREE.PlaneGeometry(60, 0.06), horizLineMat);
      horizLine.position.set(0, -3.5, -30);
      scene.add(horizLine);

      // ── Vertical neon grid lines (perspective lines to horizon) ───────────
      const vLineMat = new THREE.MeshBasicMaterial({ color: 0xff00cc, transparent: true, opacity: 0.5 });
      [-6, -4, -2, 0, 2, 4, 6].forEach(x => {
        const vl = new THREE.Mesh(new THREE.PlaneGeometry(0.05, 35), vLineMat);
        vl.rotation.x = -Math.PI / 2;
        vl.rotation.z = Math.PI / 2;
        // Tilt to perspective vanishing point
        vl.position.set(x, -3.49, -15);
        scene.add(vl);
      });

      // ── Palm tree silhouettes ─────────────────────────────────────────────
      function makePalm(x, z, scale = 1) {
        const g = new THREE.Group();
        const mat = new THREE.MeshBasicMaterial({ color: 0x0a0015 });

        // Trunk — slight curve via stacked cylinders
        const segments = 5;
        let cy = -3.5, cx = 0;
        for (let i = 0; i < segments; i++) {
          const r = (0.12 - i * 0.015) * scale;
          const trunk = new THREE.Mesh(new THREE.CylinderGeometry(r, r + 0.015 * scale, 0.9 * scale, 6), mat);
          const lean = (i * 0.06 - 0.1) * scale;
          trunk.position.set(cx + lean * 0.5, cy + 0.45 * scale, 0);
          trunk.rotation.z = lean * 0.15;
          g.add(trunk);
          cy += 0.85 * scale;
          cx += lean * 0.15;
        }

        // Fronds — 7 drooping leaves
        const topY = cy;
        const topX = cx;
        for (let i = 0; i < 7; i++) {
          const angle = (i / 7) * Math.PI * 2;
          const frond = new THREE.Mesh(new THREE.ConeGeometry(0.08 * scale, 1.6 * scale, 4), mat);
          frond.position.set(
            topX + Math.cos(angle) * 0.5 * scale,
            topY + 0.4 * scale,
            Math.sin(angle) * 0.3 * scale
          );
          frond.rotation.z = Math.cos(angle) * 0.9;
          frond.rotation.x = Math.sin(angle) * 0.5;
          g.add(frond);
        }

        g.position.set(x, 0, z);
        scene.add(g);
        return g;
      }

      // Place palms at different depths for parallax
      makePalm(-7,  -2, 1.3);   // near left
      makePalm( 7,  -2, 1.3);   // near right
      makePalm(-9, -10, 1.0);   // mid left
      makePalm( 9, -10, 1.0);   // mid right
      makePalm(-5, -20, 0.7);   // far left
      makePalm( 5, -20, 0.7);   // far right
      makePalm(-11,-18, 0.6);   // far far left
      makePalm( 11,-18, 0.6);   // far far right

      // ── Distant city silhouette ───────────────────────────────────────────
      const cityMat = new THREE.MeshBasicMaterial({ color: 0x0a0015 });
      const buildings = [
        [-14, 2.5, 0.8], [-11, 3.5, 1.0], [-8, 2.0, 0.7], [-6, 4.0, 0.6],
        [-4,  1.8, 0.5], [-2, 3.0, 0.8],  [0,  5.0, 0.9], [2,  2.8, 0.6],
        [4,   3.5, 0.7], [6,  1.5, 0.5],  [8,  4.2, 0.9], [11, 2.8, 1.0],
        [14,  3.0, 0.8],
      ];
      buildings.forEach(([bx, bh, bw]) => {
        const b = new THREE.Mesh(new THREE.BoxGeometry(bw * 2, bh, 0.4), cityMat);
        b.position.set(bx, -3.5 + bh / 2 - 0.5, -28);
        scene.add(b);

        // Neon window glints on buildings
        if (Math.random() > 0.4) {
          const wMat = new THREE.MeshBasicMaterial({
            color: Math.random() > 0.5 ? 0xff00ff : 0x00ffff,
            transparent: true, opacity: 0.7
          });
          const win = new THREE.Mesh(new THREE.PlaneGeometry(0.12, 0.12), wMat);
          win.position.set(bx + (Math.random() - 0.5) * bw, -3.5 + bh * 0.6, -27.8);
          scene.add(win);
        }
      });

      // ── Neon window frame ─────────────────────────────────────────────────
      const neonFrameMat = new THREE.MeshStandardMaterial({
        color: 0xff00ff, emissive: 0xff00ff, emissiveIntensity: 2, roughness: 0.1
      });
      function nbar(w, h, d, x, y, z) {
        const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), neonFrameMat);
        m.position.set(x, y, z);
        frameGroup.add(m);
      }
      const fz = 5.5, fw = 9, fh = 6.5;
      nbar(fw + 0.4, 0.2, 0.2,  0,       fh / 2, fz);
      nbar(fw + 0.4, 0.2, 0.2,  0,      -fh / 2, fz);
      nbar(0.2, fh + 0.2, 0.2, -fw / 2,  0,      fz);
      nbar(0.2, fh + 0.2, 0.2,  fw / 2,  0,      fz);

      // ── Flying grid lines (animated streaks, speed-lines) ─────────────────
      const streaks = [];
      const streakMat = new THREE.MeshBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.6 });
      for (let i = 0; i < 18; i++) {
        const len = 0.3 + Math.random() * 1.2;
        const streak = new THREE.Mesh(new THREE.PlaneGeometry(0.04, len), streakMat);
        streak.position.set(
          (Math.random() - 0.5) * 16,
          -1 + Math.random() * 4,
          -5 - Math.random() * 20
        );
        streak.rotation.x = Math.PI / 2;
        streak.userData.speed = 0.05 + Math.random() * 0.12;
        scene.add(streak);
        streaks.push(streak);
      }

      // ── Lights ────────────────────────────────────────────────────────────
      scene.add(new THREE.AmbientLight(0x110022, 1.0));

      const sunGlow = new THREE.PointLight(0xff0088, 20, 40);
      sunGlow.position.set(0, 1.2, -30);
      scene.add(sunGlow);

      const magentaFill = new THREE.PointLight(0xff00ff, 12, 20);
      magentaFill.position.set(-5, 2, -5);
      scene.add(magentaFill);

      const cyanFill = new THREE.PointLight(0x00ffff, 10, 18);
      cyanFill.position.set(5, -1, -3);
      scene.add(cyanFill);

      const groundGlow = new THREE.PointLight(0xcc00ff, 8, 12);
      groundGlow.position.set(0, -2, 0);
      scene.add(groundGlow);

      let t = 0;
      return {
        animateFn(time) {
          t = time;

          // Speed streaks flying toward viewer
          streaks.forEach(s => {
            s.position.z += s.userData.speed;
            if (s.position.z > 6) {
              s.position.z = -22;
              s.position.x = (Math.random() - 0.5) * 16;
              s.position.y = -1 + Math.random() * 4;
            }
          });

          // Sun pulse
          sunGlow.intensity = 18 + Math.sin(time * 0.8) * 4;

          // Grid floor colour shift (subtle)
          farGrid.material.opacity  = 0.45 + Math.sin(time * 0.5) * 0.1;
          midGrid.material.opacity  = 0.35 + Math.sin(time * 0.7 + 1) * 0.1;

          // Magenta/cyan light oscillate
          magentaFill.intensity = 10 + Math.sin(time * 1.1) * 3;
          cyanFill.intensity    = 8  + Math.sin(time * 1.3 + 2) * 3;
        },
        cleanup() {}
      };
    }

    // ─── Initial scene ────────────────────────────────────────────────────────
    loadScene(1);

    // ─── Render loop ─────────────────────────────────────────────────────────
    const basePos    = new THREE.Vector3(0, 0, 8);
    const lookTarget = new THREE.Vector3(0, 0, 0);
    let t = 0;

    function animate() {
      requestAnimationFrame(animate);
      t += 0.005;

      if (!state.paused) {
        state.headX += (state.rawX - state.headX) * state.smoothing;
        state.headY += (state.rawY - state.headY) * state.smoothing;
      }

      const camX = -state.headX * state.sensitivity;
      const camY = -state.headY * state.sensitivity * 0.6;
      camera.position.set(basePos.x + camX, basePos.y + camY, basePos.z);
      camera.lookAt(lookTarget);

      if (activeScene && activeScene.animateFn) activeScene.animateFn(t);

      renderer.render(scene, camera);
    }
    animate();

    // ─── Status UI ───────────────────────────────────────────────────────────
    const dot      = document.getElementById('status-dot');
    const statusTx = document.getElementById('status-text');

    function setStatus(text, dotClass) {
      statusTx.textContent = text;
      dot.className = '';
      if (dotClass) dot.classList.add(dotClass);
    }

    // ─── Mouse fallback ───────────────────────────────────────────────────────
    function enableMouseMode() {
      state.cameraMode = 'mouse';
      setStatus('Mouse mode', 'active');
      document.addEventListener('mousemove', (e) => {
        if (state.paused) return;
        state.rawX =  (e.clientX / window.innerWidth  - 0.5) * 2;
        state.rawY = -(e.clientY / window.innerHeight - 0.5) * 2;
      });
    }

    // ─── Webcam ───────────────────────────────────────────────────────────────
    const video = document.getElementById('webcam');

    async function startWebcam() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
        video.srcObject = stream;
        await video.play();
        setStatus('Webcam active — no face yet', 'warning');
        startFaceTracking();
      } catch (err) {
        console.warn('Camera denied:', err);
        setStatus('Camera denied — mouse mode', 'warning');
        enableMouseMode();
      }
    }

    // ─── Face tracking ────────────────────────────────────────────────────────
    async function startFaceTracking() {
      try {
        const { FaceLandmarker, FilesetResolver } =
          await import('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs');

        const filesetResolver = await FilesetResolver.forVisionTasks(
          'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm'
        );

        const faceLandmarker = await FaceLandmarker.createFromOptions(filesetResolver, {
          baseOptions: {
            modelAssetPath:
              'https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task',
            delegate: 'GPU',
          },
          runningMode: 'VIDEO',
          numFaces: 1,
        });

        setStatus('Face tracking ready', 'active');
        let lastVideoTime = -1;

        function trackFace() {
          if (video.readyState >= 2 && video.currentTime !== lastVideoTime) {
            lastVideoTime = video.currentTime;
            const results = faceLandmarker.detectForVideo(video, performance.now());

            if (results.faceLandmarks && results.faceLandmarks.length > 0) {
              const nose = results.faceLandmarks[0][1];
              const rawX =  (nose.x - 0.5) * 2;
              const rawY = -(nose.y - 0.5) * 2;
              state.rawX = state.mirrorX ?  rawX : -rawX;
              state.rawY = state.mirrorY ? -rawY :  rawY;

              if (!state.faceDetected) {
                state.faceDetected = true;
                setStatus('Tracking', 'active');
              }
            } else {
              if (state.faceDetected) {
                state.faceDetected = false;
                setStatus('No face detected', 'warning');
              }
              state.rawX *= 0.95;
              state.rawY *= 0.95;
            }
          }
          requestAnimationFrame(trackFace);
        }
        trackFace();

      } catch (err) {
        console.warn('MediaPipe failed:', err);
        setStatus('Face tracking failed — mouse mode', 'warning');
        enableMouseMode();
      }
    }

    // ─── Permission overlay ───────────────────────────────────────────────────
    document.getElementById('start-btn').addEventListener('click', () => {
      document.getElementById('permission-overlay').style.display = 'none';
      startWebcam();
    });
    document.getElementById('skip-btn').addEventListener('click', () => {
      document.getElementById('permission-overlay').style.display = 'none';
      enableMouseMode();
    });

    // ─── Settings ─────────────────────────────────────────────────────────────
    const settingsEl    = document.getElementById('settings');
    const sensSlider    = document.getElementById('sens-slider');
    const smoothSlider  = document.getElementById('smooth-slider');
    const mirrorToggle  = document.getElementById('mirror-toggle');
    const mirrorYToggle = document.getElementById('mirrory-toggle');

    sensSlider.addEventListener('input', () => {
      state.sensitivity = parseFloat(sensSlider.value);
      document.getElementById('sens-val').textContent = sensSlider.value;
    });

    smoothSlider.addEventListener('input', () => {
      const v = parseInt(smoothSlider.value) / 100;
      state.smoothing = v;
      document.getElementById('smooth-val').textContent = v.toFixed(2);
    });

    mirrorToggle.addEventListener('change', () => {
      state.mirrorX = mirrorToggle.checked;
      document.getElementById('mirror-val').textContent = state.mirrorX ? 'On' : 'Off';
    });

    mirrorYToggle.addEventListener('change', () => {
      state.mirrorY = mirrorYToggle.checked;
      document.getElementById('mirrory-val').textContent = state.mirrorY ? 'On' : 'Off';
    });

    document.getElementById('frame-toggle').addEventListener('change', (e) => {
      frameGroup.visible = e.target.checked;
      document.getElementById('frame-val').textContent = e.target.checked ? 'On' : 'Off';
    });

    // Scene buttons
    document.querySelectorAll('.scene-btn').forEach(btn => {
      btn.addEventListener('click', () => loadScene(parseInt(btn.dataset.scene)));
    });

    // ─── Keyboard shortcuts ───────────────────────────────────────────────────
    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        state.paused = !state.paused;
        setStatus(state.paused ? 'Paused' : (state.faceDetected ? 'Tracking' : 'Active'), state.paused ? 'warning' : 'active');
      }
      if (e.code === 'KeyS') settingsEl.classList.toggle('visible');
      if (e.code === 'KeyD') video.style.display = video.style.display === 'none' ? 'block' : 'none';
      if (e.code === 'KeyF') {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        else document.exitFullscreen();
      }
    });

    document.addEventListener('visibilitychange', () => {
      state.paused = document.hidden;
    });

  </script>
</body>
</html>
