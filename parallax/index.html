<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parallax Window</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      overflow: hidden;
      font-family: system-ui, sans-serif;
    }

    #three-canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }

    #webcam {
      position: fixed;
      bottom: 10px;
      right: 10px;
      width: 160px;
      height: 120px;
      border-radius: 8px;
      opacity: 0.4;
      border: 1px solid rgba(255,255,255,0.2);
      display: none;
      transform: scaleX(-1);
    }

    #status {
      position: fixed;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.55);
      color: #fff;
      font-size: 12px;
      padding: 5px 12px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      gap: 7px;
      pointer-events: none;
      transition: opacity 0.4s;
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.12);
    }

    #status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #888;
      transition: background 0.3s;
    }

    #status-dot.active   { background: #4ade80; }
    #status-dot.warning  { background: #facc15; }
    #status-dot.error    { background: #f87171; }

    #settings {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 14px 20px;
      color: #fff;
      font-size: 12px;
      display: none;
      gap: 14px;
      flex-direction: column;
      min-width: 280px;
    }

    #settings.visible { display: flex; }

    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .setting-row label { min-width: 90px; opacity: 0.8; }

    .setting-row input[type=range] {
      flex: 1;
      accent-color: #818cf8;
    }

    .setting-row span { min-width: 30px; text-align: right; opacity: 0.7; }

    .setting-divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.1);
      margin: 2px 0;
    }

    /* Scene selector buttons */
    #scene-btns {
      display: flex;
      gap: 8px;
      flex: 1;
    }

    .scene-btn {
      flex: 1;
      padding: 6px 4px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.2);
      background: transparent;
      color: rgba(255,255,255,0.6);
      font-size: 11px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
      white-space: nowrap;
    }

    .scene-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .scene-btn.active { background: #818cf8; border-color: #818cf8; color: #fff; }

    #hint {
      position: fixed;
      bottom: 16px;
      right: 20px;
      font-size: 11px;
      color: rgba(255,255,255,0.3);
      pointer-events: none;
    }

    #permission-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      gap: 16px;
      z-index: 100;
      backdrop-filter: blur(4px);
    }

    #permission-overlay h2 { font-size: 22px; font-weight: 600; }
    #permission-overlay p  { font-size: 14px; opacity: 0.7; max-width: 360px; text-align: center; line-height: 1.6; }

    #permission-overlay .privacy-note {
      font-size: 12px;
      opacity: 0.45;
      max-width: 340px;
      text-align: center;
    }

    #start-btn {
      background: #818cf8;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 28px;
      font-size: 14px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s;
    }

    #start-btn:hover { background: #6366f1; }

    #skip-btn {
      background: transparent;
      color: rgba(255,255,255,0.4);
      border: none;
      font-size: 12px;
      cursor: pointer;
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div id="permission-overlay">
    <h2>Parallax Window</h2>
    <p>Uses your webcam to track head position and shift the 3D scene perspective — like looking through a window.</p>
    <p class="privacy-note">All processing happens locally in your browser. No video is ever sent anywhere.</p>
    <button id="start-btn">Enable Camera</button>
    <button id="skip-btn">Skip (mouse mode)</button>
  </div>

  <canvas id="three-canvas"></canvas>
  <video id="webcam" autoplay playsinline muted></video>

  <div id="status">
    <div id="status-dot"></div>
    <span id="status-text">Initialising…</span>
  </div>

  <div id="settings">
    <!-- Scene selector -->
    <div class="setting-row">
      <label>Scene</label>
      <div id="scene-btns">
        <button class="scene-btn active" data-scene="1">Space</button>
        <button class="scene-btn"        data-scene="2">Forest</button>
        <button class="scene-btn"        data-scene="3">Cockpit</button>
        <button class="scene-btn"        data-scene="4">Synthwave</button>
      </div>
    </div>
    <hr class="setting-divider" />
    <div class="setting-row">
      <label>Sensitivity</label>
      <input type="range" id="sens-slider" min="1" max="20" value="8" step="0.5" />
      <span id="sens-val">8</span>
    </div>
    <div class="setting-row">
      <label>Smoothing</label>
      <input type="range" id="smooth-slider" min="1" max="30" value="12" step="1" />
      <span id="smooth-val">0.12</span>
    </div>
    <div class="setting-row">
      <label>Mirror X</label>
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;flex:1">
        <input type="checkbox" id="mirror-toggle" checked style="width:16px;height:16px;accent-color:#818cf8;cursor:pointer" />
        <span id="mirror-val" style="opacity:0.7">On</span>
      </label>
    </div>
    <div class="setting-row">
      <label>Mirror Y</label>
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;flex:1">
        <input type="checkbox" id="mirrory-toggle" checked style="width:16px;height:16px;accent-color:#818cf8;cursor:pointer" />
        <span id="mirrory-val" style="opacity:0.7">On</span>
      </label>
    </div>
    <div class="setting-row">
      <label>Window Frame</label>
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;flex:1">
        <input type="checkbox" id="frame-toggle" checked style="width:16px;height:16px;accent-color:#818cf8;cursor:pointer" />
        <span id="frame-val" style="opacity:0.7">On</span>
      </label>
    </div>
  </div>

  <div id="hint">S — settings &nbsp;|&nbsp; F — fullscreen &nbsp;|&nbsp; D — debug cam &nbsp;|&nbsp; Space — pause</div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js"
    }
  }
  </script>

  <script type="module" src="main.js"></script>

  <!-- Source split into modules:
       main.js          — entry point
       state.js         — shared mutable state
       renderer.js      — WebGLRenderer, camera, scene, animation loop
       tracking.js      — webcam, MediaPipe face tracking, mouse fallback, status UI
       ui.js            — all DOM event handlers
       scenes/index.js  — clearScene / loadScene registry
       scenes/space.js  — Scene 1: Space / Geometric
       scenes/forest.js — Scene 2: Night Forest
       scenes/cockpit.js   — Scene 3: Spaceship Cockpit
       scenes/synthwave.js — Scene 4: Synthwave City
  -->
</body>
</html>
