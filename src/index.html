<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Little Games</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:        #0b0c10;
      --surface:   #13141a;
      --border:    rgba(255,255,255,0.08);
      --accent:    #818cf8;
      --accent2:   #34d399;
      --text:      #e2e4f0;
      --muted:     #6b7280;
      --radius:    12px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 60px 20px 80px;
    }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 56px;
      position: relative;
    }

    header h1 {
      font-size: clamp(28px, 5vw, 42px);
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header p {
      margin-top: 10px;
      font-size: 14px;
      color: var(--muted);
    }

    /* ── Language switcher ── */
    #lang-switcher {
      position: absolute;
      top: 0;
      right: 0;
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .lang-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 20px;
      cursor: pointer;
      line-height: 1;
      transition: border-color 0.15s, background 0.15s;
      user-select: none;
    }

    .lang-btn:hover {
      border-color: rgba(129,140,248,0.45);
      background: rgba(255,255,255,0.04);
    }

    .lang-btn.active {
      border-color: var(--accent);
      background: rgba(129,140,248,0.12);
    }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
      width: 100%;
      max-width: 900px;
    }

    /* ── Card ── */
    .card {
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: rgba(129,140,248,0.45);
      box-shadow: 0 8px 32px rgba(0,0,0,0.45);
    }

    .card:active {
      transform: translateY(-1px);
    }

    /* Thumbnail / preview area */
    .card-thumb {
      width: 100%;
      aspect-ratio: 16 / 9;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 64px;
      user-select: none;
      position: relative;
      overflow: hidden;
    }

    /* Subtle animated shimmer on hover */
    .card-thumb::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.05) 50%, transparent 70%);
      transform: translateX(-100%);
      transition: transform 0.5s ease;
    }

    .card:hover .card-thumb::after {
      transform: translateX(100%);
    }

    .card-body {
      padding: 18px 20px 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
    }

    .card-title {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.2px;
    }

    .card-desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.55;
      flex: 1;
    }

    .card-meta {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 4px;
    }

    .tag {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 20px;
      border: 1px solid var(--border);
      color: var(--muted);
      background: rgba(255,255,255,0.03);
      white-space: nowrap;
    }

    /* ── Footer ── */
    footer {
      margin-top: auto;
      padding-top: 48px;
      font-size: 12px;
      color: var(--muted);
      opacity: 0.5;
    }
  </style>
</head>
<body>

  <header>
    <h1>Little Games</h1>
    <p id="header-desc"></p>
    <div id="lang-switcher">
      <button class="lang-btn" data-lang="hu" title="Magyar">🇭🇺</button>
      <button class="lang-btn" data-lang="en" title="English">🇬🇧</button>
    </div>
  </header>

  <div class="grid" id="game-grid"></div>

  <footer id="footer-text"></footer>

  <script src="games.js"></script>
  <script>
    const UI = {
      hu: {
        desc:   "Böngészős mini-játékok gyűjteménye – telepítés és regisztráció nélkül.",
        footer: "nyílt forráskódú · csak a böngészőben fut",
      },
      en: {
        desc:   "A collection of browser experiments — no installs, no accounts.",
        footer: "open-source · runs entirely in the browser",
      },
    };

    const DEFAULT_LANG = "hu";
    let currentLang = localStorage.getItem("lang") || DEFAULT_LANG;

    function buildGrid(lang) {
      const grid = document.getElementById("game-grid");
      grid.innerHTML = "";

      GAMES.forEach(game => {
        const a = document.createElement("a");
        a.className = "card";
        a.href = game.id + "/";
        a.dataset.game = game.id;

        a.innerHTML = `
          <div class="card-thumb" style="background: ${game.thumb}">${game.emoji}</div>
          <div class="card-body">
            <div class="card-title">${game[lang].title}</div>
            <div class="card-desc">${game[lang].desc}</div>
            <div class="card-meta">${game.tags.map(t => `<span class="tag">${t}</span>`).join("")}</div>
          </div>`;

        grid.appendChild(a);
      });
    }

    function applyLang(lang) {
      currentLang = lang;
      localStorage.setItem("lang", lang);
      document.documentElement.lang = lang;

      document.getElementById("header-desc").textContent = UI[lang].desc;
      document.getElementById("footer-text").textContent = UI[lang].footer;

      document.querySelectorAll(".lang-btn").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.lang === lang);
      });

      buildGrid(lang);
    }

    document.getElementById("lang-switcher").addEventListener("click", e => {
      const btn = e.target.closest(".lang-btn");
      if (btn) applyLang(btn.dataset.lang);
    });

    applyLang(currentLang);
  </script>

</body>
</html>
